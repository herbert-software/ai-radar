name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ai_radar
          POSTGRES_PASSWORD: ai_radar
          POSTGRES_DB: ai_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_radar -d ai_radar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # 与运行镜像（Dockerfile: node:22-alpine）对齐，使 CI 跑的就是部署运行时版本。
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Migrate + idempotency (drizzle-kit migrate twice; 2nd run must no-op)
        env:
          DATABASE_URL: postgres://ai_radar:ai_radar@localhost:5432/ai_radar
        # 第一次 migrate 落表；第二次重跑验证迁移幂等（journal 已记录则跳过、结构无变化），
        # 对应任务 2.6 的「drizzle-kit migrate 可重复执行幂等」。两次均须成功退出。
        run: |
          npm run migrate
          npm run migrate

      - name: Test (vitest — pushIdempotency / dedup / URL 归一 / 降级熔断 实跑不 skip)
        env:
          # CI 有 postgres + redis services，注入真实连接串使依赖 DB/Redis 的
          # 不变量 integration 用例（pushIdempotency / dedup 塌缩 / 降级熔断 10.4 /
          # 单例锁）**实跑不 skip**——上一步已 migrate 好 schema。
          # LLM_* 为占位（指向 example.invalid）：纯 mock/单元用例（含 URL 归一）
          # 不触网；个别需真实 LLM 的用例自行降级，不影响不变量覆盖。
          DATABASE_URL: postgres://ai_radar:ai_radar@localhost:5432/ai_radar
          REDIS_URL: redis://localhost:6379
          LLM_API_KEY: ci-placeholder-key
          LLM_MODEL: gpt-4o-mini
          LLM_BASE_URL: https://example.invalid/v1
          TELEGRAM_BOT_TOKEN: ci-placeholder-token
          TELEGRAM_CHAT_ID: ci-placeholder-chat
          # Product Hunt Developer Token（必填占位）：PH 采集器单测注入桩、不触网，
          # 仅用于满足 env 启动校验；真实拉取由 11.3 一次性勘验，不在 CI 实跑。
          PRODUCT_HUNT_TOKEN: ci-placeholder-ph-token
        run: npm run test
