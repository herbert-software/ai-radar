# ai-radar 编排
#
# 两种用法：
#  1) 本地开发（只起依赖，应用在宿主机用 tsx 跑）：
#       docker compose up -d            # 仅 postgres + redis
#       docker compose ps               # 两服务均应进入 healthy
#  2) 整机部署（目标主机全栈容器化）：
#       docker compose --profile app up -d --build
#       # 起 postgres + redis + migrate(一次性) + worker(常驻) + web(/health)
#       # 详见 DEPLOY.md
#  停止清理：docker compose down（加 -v 可一并删卷）
#
# 设计：应用三服务（migrate/worker/web）归入 `app` profile——不带 --profile 时
# 不启动，使「本地只要依赖」的开发用法保持不变；DB/Redis 连接串在 app 服务里用
# 容器网络服务名（postgres/redis）覆盖 .env 中的 localhost。
#
# 不变量（来自 platform-foundation spec）：
# - postgres 使用 pgvector/pgvector 镜像作为地基。P3（add-semantic-dedup-and-store-hardening）起
#   按需启用向量能力：`CREATE EXTENSION IF NOT EXISTS vector;` 由 P3 迁移（drizzle 0006）落，
#   仅作用于 ai_news_events / kb_documents 的 vector(1536) 列（ai_products 不含向量列）。
#   compose 不挂 init SQL 启用扩展——启用逻辑收口在迁移里，由 migrate 服务（npm run migrate）执行。

# 应用三服务共享的构建与环境（YAML 锚点；merge key 只并顶层键，故各服务不再覆盖 environment）。
x-app: &app
  build: .
  # 本地 build 与 CI 推送（GHCR）共用此 tag：`up --build` 本地构建、`pull` 拉 CI 多架构镜像。
  # owner 必须与 CI 推送口径一致——docker-image.yml 用 ${{ github.repository_owner }}，
  # 本仓 owner = HerbertGao，故默认 ghcr.io/herbertgao/ai-radar（metadata-action 小写化 owner）；可用 AI_RADAR_IMAGE 覆盖。
  image: ${AI_RADAR_IMAGE:-ghcr.io/herbertgao/ai-radar:latest}
  env_file:
    - .env
  environment:
    # 覆盖 .env 里的 localhost：容器内经服务名互联。
    # DATABASE_URL 默认由 POSTGRES_* 拼出。注意：POSTGRES_PASSWORD 直接插入 URL **不做编码**，
    # 故密码须 URL 安全（字母数字等）；若密码含 @ : / % # 等保留字符，改为在 .env 设
    # AI_RADAR_DATABASE_URL=postgres://用户:已百分号编码的密码@postgres:5432/库 整串覆盖（主机名仍用服务名 postgres）。
    DATABASE_URL: ${AI_RADAR_DATABASE_URL:-postgres://${POSTGRES_USER:-ai_radar}:${POSTGRES_PASSWORD:-ai_radar}@postgres:5432/${POSTGRES_DB:-ai_radar}}
    REDIS_URL: redis://redis:6379
    # 钉死容器内监听端口为 3000：防 .env 里若写了 PORT 经 env_file 注入 web、
    # 令其监听非 3000 而主机映射写死 :3000 → /health 探活失配。migrate/worker 不起 HTTP，忽略此值。
    PORT: "3000"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_radar}
      POSTGRES_DB: ${POSTGRES_DB:-ai_radar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_radar} -d ${POSTGRES_DB:-ai_radar}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── 应用：迁移（一次性，profile=app）。worker/web 依赖它成功完成后再起。
  migrate:
    <<: *app
    profiles: ["app"]
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── 应用：常驻 worker（profile=app）。默认 3 条调度链生效（日报/产品发现/实时告警）；
  #    周报为第 4 条、默认禁用（WEEKLY_REPORT_ENABLED=false）。
  worker:
    <<: *app
    profiles: ["app"]
    command: ["npm", "run", "worker"]
    # init=true 让 tini 作 PID1：回收僵尸进程，并把 docker stop 的 SIGTERM 经 tini→npm→node
    # 可靠送达 worker-main.ts 的 SIGTERM 处理器，使 BullMQ worker/queue close、Redis quit 等
    # 优雅关闭真正执行（否则 npm 作 PID1 下信号转发不稳，可能被 SIGKILL 截断）。
    init: true
    # docker stop 默认 10s grace 对含 LLM 调用的在途 job 不够（LLM_TIMEOUT_MS 默认 60s）。
    # 给 90s 以覆盖单次 LLM 往返 + 收尾；更长的整链 job 若仍超时被 SIGKILL，由推送幂等 +
    # BullMQ 重试/claim 回收兜底（数据不破），故 90s 是「尽量优雅」而非「保证排空」。
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── 应用：Model Radar browser 档抓取（profile=app）。**独立镜像**（装 Playwright + chromium，
  #    Dockerfile 的 mr-browser-worker stage），主镜像不装 Playwright（design D15）。
  #    默认禁用（MR_SCRAPE_ENABLED=false）；改 env 即启用。entrypoint 启动先做 egress
  #    fail-closed 自检（design D11）：探到私网/元数据哨兵可达即非零退出拒启动。
  #
  #    ⚠️ 网络约束（design D11，**必需部署控制**，compose 仅给骨架、不能在此保证封禁）：
  #    本服务必须跑在封 RFC1918 / link-local（169.254.0.0/16，含云元数据 169.254.169.254）/
  #    环回的 egress 代理或容器 netns 内。具体落地（egress 代理 / netns / 防火墙规则）按部署
  #    环境（裸机 / k8s / 云）在部署期定；未配妥时自检会拒启动，不会裸奔成 SSRF-to-metadata 洞。
  mr-browser-worker:
    build:
      context: .
      target: mr-browser-worker
    # CI 推送的独立镜像（与主镜像分 tag）；可用 AI_RADAR_MR_BROWSER_IMAGE 覆盖。
    image: ${AI_RADAR_MR_BROWSER_IMAGE:-ghcr.io/herbertgao/ai-radar-mr-browser-worker:latest}
    profiles: ["app"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${AI_RADAR_DATABASE_URL:-postgres://${POSTGRES_USER:-ai_radar}:${POSTGRES_PASSWORD:-ai_radar}@postgres:5432/${POSTGRES_DB:-ai_radar}}
      REDIS_URL: redis://redis:6379
    command: ["npm", "run", "mr:browser-worker"]
    # 同 worker：tini 作 PID1 回收僵尸（浏览器子进程）+ 可靠转发 SIGTERM。
    init: true
    # browser 抓取单 job 含取页 + 渲染，给 90s grace 覆盖在途 job 收尾（与 worker 一致）。
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── 应用：HTTP 健康端点（profile=app）。暴露 /health 供监控/内网探活。
  web:
    <<: *app
    profiles: ["app"]
    command: ["npm", "start"]
    # 同 worker：tini 作 PID1 回收僵尸 + 可靠转发 SIGTERM，使 HTTP server 优雅退出。
    init: true
    # 显式给 15s（> index.ts 的 8s 兜底超时，留清晰余量；web 只 drain 短 HTTP 请求，无需 90s）。
    stop_grace_period: 15s
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # 把 /health 接入编排：busybox wget 在 503（DB/Redis down）时非零退出 → 容器转 unhealthy，
    # 使 `docker compose ps` 的健康状态可信、而非进程活着就恒显 Up。
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
